<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#1f9d55">
<title>Frutería · Control de Negocio</title>
<style>
/* ============================ TOKENS ============================ */
:root{
  --bg:#f6f8f4; --surface:#ffffff; --surface-2:#f1f5ef;
  --ink:#15241b; --muted:#5d6f63; --faint:#8a9890;
  --line:#e4ebe2; --line-2:#d6e0d3;
  --green:#1f9d55; --green-d:#15803d; --green-soft:#e7f6ec;
  --mango:#f59e0b; --mango-soft:#fef3da;
  --rose:#e11d48; --rose-soft:#fce8ec;
  --blue:#2563eb; --blue-soft:#e6efff;
  --r:16px; --r-sm:11px;
  --sh:0 1px 2px rgba(20,40,28,.06), 0 8px 24px rgba(20,40,28,.06);
  --sh-lg:0 12px 40px rgba(20,40,28,.18);
  --safe-b:env(safe-area-inset-bottom,0px);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;overflow:hidden}
body{
  font-family:var(--font); background:var(--bg); color:var(--ink);
  font-size:16px; line-height:1.45; -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
.num{font-variant-numeric:tabular-nums}
.hidden{display:none!important}
h1,h2,h3,p{margin:0}

/* ============================ APP SHELL ============================ */
#app{max-width:560px;margin:0 auto;height:100%;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.topbar{
  background:rgba(246,248,244,.95);backdrop-filter:saturate(1.4) blur(10px);
  border-bottom:1px solid var(--line);padding:10px 16px;display:flex;align-items:center;gap:10px;
}
.topbar .brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:-.02em;font-size:17px}
.topbar .brand .logo{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
  background:linear-gradient(150deg,var(--green),var(--green-d));color:#fff;font-size:17px}
.topbar .spacer{flex:1}
.sync-pill{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--muted);
  background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:5px 10px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--faint)}
.sync-dot.on{background:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
.sync-dot.off{background:var(--mango)}
.icon-btn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--surface);
  border:1px solid var(--line);font-size:18px}

main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(80px + var(--safe-b));}
.view{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ============================ NAV ============================ */
.nav{
  position:fixed;left:0;right:0;bottom:0;z-index:40;
  max-width:560px;margin:0 auto;padding:8px 8px calc(8px + var(--safe-b));
  background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);
  display:grid;grid-template-columns:repeat(5,1fr);gap:2px;
  -webkit-transform:translateZ(0);transform:translateZ(0);will-change:transform;
}
.nav button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border-radius:12px;
  color:var(--faint);font-size:10.5px;font-weight:700;letter-spacing:.01em}
.nav button .ni{font-size:21px;line-height:1}
.nav button.active{color:var(--green-d)}
.nav button.active .ni{transform:translateY(-1px)}
.nav button.sell{color:var(--green-d)}
.nav button.sell .ni{background:linear-gradient(150deg,var(--green),var(--green-d));width:50px;height:50px;
  border-radius:16px;display:grid;place-items:center;margin-top:-20px;box-shadow:0 8px 20px rgba(31,157,85,.45);font-size:30px;line-height:1}
.nav button.sell.active{color:var(--green-d)}

/* ============================ CARDS / GENERIC ============================ */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
.pad{padding:16px}
.sec-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);
  margin:22px 4px 10px}
.sec-title:first-child{margin-top:2px}
.row{display:flex;align-items:center;gap:12px}
.between{display:flex;align-items:center;justify-content:space-between;gap:12px}
.muted{color:var(--muted)}.faint{color:var(--faint)}
.tiny{font-size:12px}.big{font-size:15px}
.b{font-weight:700}.bb{font-weight:800}
.money{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.pos{color:var(--green-d)}.neg{color:var(--rose)}
.divider{height:1px;background:var(--line);margin:12px 0}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:800;font-size:15px;
  padding:13px 18px;border-radius:13px;background:var(--surface-2);color:var(--ink);border:1px solid var(--line);transition:.12s}
.btn:active{transform:scale(.98)}
.btn.primary{background:linear-gradient(150deg,var(--green),var(--green-d));color:#fff;border:none;box-shadow:0 6px 16px rgba(31,157,85,.32)}
.btn.rose{background:var(--rose);color:#fff;border:none}
.btn.ghost{background:transparent}
.btn.block{display:flex;width:100%}
.btn.sm{padding:9px 13px;font-size:13px;border-radius:10px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;
  background:var(--surface-2);border:1px solid var(--line);color:var(--muted);white-space:nowrap}
.chip.g{background:var(--green-soft);color:var(--green-d);border-color:transparent}
.chip.m{background:var(--mango-soft);color:#9a6700;border-color:transparent}
.chip.r{background:var(--rose-soft);color:var(--rose);border-color:transparent}
.chip.b{background:var(--blue-soft);color:var(--blue);border-color:transparent}

.empty{text-align:center;padding:40px 20px;color:var(--faint)}
.empty .e-ico{font-size:42px;display:block;margin-bottom:10px;opacity:.85}

.field{margin-bottom:13px}
.field label{display:block;font-size:12.5px;font-weight:800;color:var(--muted);margin:0 2px 6px}
.field input,.field select,.field textarea{width:100%;padding:13px 14px;border:1.5px solid var(--line-2);border-radius:12px;
  background:var(--surface);color:var(--ink);outline:none;transition:.12s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green);box-shadow:0 0 0 4px var(--green-soft)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

/* ============================ STATS ============================ */
.stat-hero{background:linear-gradient(155deg,#1c8f4e,#0f6b34);color:#fff;border-radius:20px;padding:18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.stat-hero .emj{position:absolute;right:-6px;top:-10px;font-size:96px;opacity:.13;transform:rotate(-12deg)}
.stat-hero .lbl{font-size:13px;font-weight:700;opacity:.9}
.stat-hero .val{font-size:34px;font-weight:800;letter-spacing:-.02em;margin-top:2px}
.stat-hero .sub{font-size:13px;opacity:.92;margin-top:4px}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:11px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px}
.kpi .k-lbl{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--faint)}
.kpi .k-val{font-size:21px;font-weight:800;letter-spacing:-.02em;margin-top:3px}
.kpi .k-sub{font-size:12px;color:var(--muted);margin-top:1px}

/* ============================ PRODUCT GRID (POS) ============================ */
.cats{display:flex;gap:7px;overflow-x:auto;padding:2px 0 10px;margin:0 -16px;padding-left:16px;padding-right:16px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat-pill{flex:0 0 auto;padding:8px 14px;border-radius:999px;font-weight:800;font-size:13.5px;background:var(--surface);
  border:1.5px solid var(--line);color:var(--muted);white-space:nowrap}
.cat-pill.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pcard{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:11px 8px 10px;text-align:center;
  position:relative;transition:.1s;box-shadow:var(--sh)}
.pcard:active{transform:scale(.96)}
.pcard .pemj{font-size:34px;line-height:1;display:block;margin-bottom:5px}
.pcard .pn{font-size:12.5px;font-weight:800;line-height:1.15;min-height:29px;display:flex;align-items:center;justify-content:center}
.pcard .pp{font-size:12px;font-weight:800;color:var(--green-d);margin-top:3px}
.pcard .pu{font-size:10.5px;color:var(--faint);font-weight:700}
.pcard.out{opacity:.45}
.pcard .badge{position:absolute;top:-5px;right:-5px;background:var(--rose);color:#fff;font-size:10px;font-weight:800;
  padding:2px 6px;border-radius:999px;box-shadow:var(--sh)}
.pcard .badge.low{background:var(--mango)}

/* search */
.search{display:flex;align-items:center;gap:9px;background:var(--surface);border:1.5px solid var(--line);
  border-radius:13px;padding:11px 14px;margin-bottom:12px}
.search input{border:none;outline:none;flex:1;background:none;padding:0}

/* ============================ TICKET / CART ============================ */
.ticket-bar{position:fixed;left:0;right:0;bottom:calc(72px + var(--safe-b));max-width:560px;margin:0 auto;padding:0 12px;z-index:35}
.ticket-bar .inner{background:var(--ink);color:#fff;border-radius:16px;padding:13px 16px;display:flex;align-items:center;
  justify-content:space-between;box-shadow:var(--sh-lg)}
.ticket-bar .tt{font-size:12px;opacity:.7;font-weight:700}
.ticket-bar .tv{font-size:22px;font-weight:800}
.ticket-bar .go{background:var(--green);color:#fff;padding:11px 18px;border-radius:12px;font-weight:800;display:flex;gap:7px;align-items:center}

.line-item{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid var(--line)}
.line-item:last-child{border-bottom:none}
.line-item .li-emj{font-size:26px}
.line-item .li-info{flex:1;min-width:0}
.line-item .li-n{font-weight:800;font-size:14.5px}
.line-item .li-q{font-size:12.5px;color:var(--muted)}
.line-item .li-sub{font-weight:800;font-variant-numeric:tabular-nums}
.line-item .li-x{width:30px;height:30px;border-radius:9px;background:var(--rose-soft);color:var(--rose);display:grid;place-items:center;font-size:16px;font-weight:800}

/* list rows */
.lrow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.lrow:last-child{border-bottom:none}
.lrow .l-emj{font-size:27px;width:34px;text-align:center}
.lrow .l-main{flex:1;min-width:0}
.lrow .l-n{font-weight:800;font-size:14.5px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.lrow .l-s{font-size:12.5px;color:var(--muted);margin-top:1px}
.lrow .l-r{text-align:right;white-space:nowrap}
.bar{height:6px;border-radius:99px;background:var(--surface-2);overflow:hidden;margin-top:5px}
.bar > span{display:block;height:100%;border-radius:99px;background:var(--green)}

/* ============================ MODAL / SHEET ============================ */
.scrim{position:fixed;inset:0;z-index:90;background:rgba(15,30,20,.5);backdrop-filter:blur(2px);
  display:flex;align-items:flex-end;justify-content:center;animation:fade .2s}
.sheet{background:var(--surface);width:100%;max-width:560px;border-radius:22px 22px 0 0;max-height:92vh;overflow-y:auto;
  padding:8px 18px calc(20px + var(--safe-b));animation:up .26s cubic-bezier(.16,1,.3,1);box-shadow:var(--sh-lg)}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet .grab{width:42px;height:5px;border-radius:99px;background:var(--line-2);margin:8px auto 14px}
.sheet h2{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:2px}
.sheet .sub{color:var(--muted);font-size:13.5px;margin-bottom:16px}
.modal-center{align-items:center;padding:18px}
.modal-center .sheet{border-radius:22px;max-width:440px}

/* qty entry */
.qty-display{text-align:center;padding:14px;background:var(--surface-2);border-radius:16px;margin-bottom:14px}
.qty-display .qd-emj{font-size:40px}
.qty-display .qd-n{font-weight:800;font-size:18px;margin-top:2px}
.qty-display .qd-big{font-size:40px;font-weight:800;letter-spacing:-.02em;margin-top:6px;font-variant-numeric:tabular-nums}
.qty-display .qd-sub{color:var(--muted);font-size:13px}
.seg{display:flex;background:var(--surface-2);border-radius:12px;padding:4px;margin-bottom:14px}
.seg button{flex:1;padding:9px;border-radius:9px;font-weight:800;font-size:13.5px;color:var(--muted)}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--sh)}
.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.quick button{padding:13px 0;border-radius:12px;background:var(--surface-2);font-weight:800;font-size:15px;border:1.5px solid transparent}
.quick button:active{border-color:var(--green)}
.stepper{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:14px}
.stepper button{width:54px;height:54px;border-radius:15px;background:var(--surface-2);font-size:26px;font-weight:800;display:grid;place-items:center}
.stepper .sv{font-size:38px;font-weight:800;min-width:80px;text-align:center;font-variant-numeric:tabular-nums}
.bigin{width:100%;text-align:center;font-size:34px;font-weight:800;padding:10px;border:2px solid var(--line-2);border-radius:14px;outline:none;font-variant-numeric:tabular-nums}
.bigin:focus{border-color:var(--green)}

/* pay methods */
.pays{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:8px}
.pays button{padding:14px 6px;border-radius:14px;background:var(--surface-2);border:2px solid transparent;font-weight:800;font-size:13px;display:flex;flex-direction:column;gap:5px;align-items:center}
.pays button .pico{font-size:23px}
.pays button.on{border-color:var(--green);background:var(--green-soft);color:var(--green-d)}

/* toast */
#toast{position:fixed;left:50%;bottom:calc(150px + var(--safe-b));transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:12px 20px;border-radius:13px;font-weight:700;font-size:14px;z-index:200;
  opacity:0;pointer-events:none;transition:.28s;box-shadow:var(--sh-lg);max-width:90%;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--green-d)}#toast.bad{background:var(--rose)}

/* login */
.login{min-height:100vh;display:flex;flex-direction:column;justify-content:center;
  padding:36px 28px 40px;max-width:420px;margin:0 auto;background:#ffffff}
.login .llogo{width:72px;height:72px;border-radius:22px;display:grid;place-items:center;font-size:38px;
  margin:0 auto 14px;background:linear-gradient(150deg,var(--green),var(--green-d));
  box-shadow:0 12px 30px rgba(31,157,85,.35)}
.login .l-biz{text-align:center;font-size:22px;font-weight:900;color:var(--ink);
  letter-spacing:-.03em;margin-bottom:4px}
.login h1{text-align:center;font-size:15px;font-weight:600;color:var(--muted);margin:0 0 28px}
.login p.s{text-align:center;color:var(--muted);font-size:13px;margin:-20px 0 24px}
.login .field label{color:#555;font-size:13px;font-weight:700}
.login .field input{background:#f7f8f9;border:1.5px solid #e8eae6;border-radius:13px;
  font-size:16px;padding:13px 16px;color:#111}
.login .field input:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(31,157,85,.12)}
.login #lgBtn{margin-top:6px;padding:15px;font-size:16px;border-radius:14px;font-weight:800;
  letter-spacing:.01em;box-shadow:0 6px 18px rgba(31,157,85,.35)}
.login #lgToggle{margin-top:10px;background:#f0f0f0;color:#444;border:none;border-radius:14px;
  padding:13px;font-size:14px;font-weight:700;width:100%;cursor:pointer}
.login #lgToggle:hover{background:#e8e8e8}
.link{color:var(--green-d);font-weight:800;background:none}

@media(max-width:360px){.pgrid{grid-template-columns:repeat(2,1fr)}.pcard .pemj{font-size:30px}}
</style>
</head>
<body>

<!-- ===================== LOGIN (solo si activas nube) ===================== -->
<div id="loginScreen" class="login hidden">
  <div class="llogo">🍉</div>
  <div class="l-biz">Frutería El Mercadito</div>
  <h1 id="loginTitle">Inicia sesión para continuar</h1>
  <div class="field"><label>Correo</label><input id="lgEmail" type="email" inputmode="email" placeholder="tucorreo@gmail.com" autocomplete="email"></div>
  <div class="field" style="margin-top:12px"><label>Contraseña</label><input id="lgPass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
  <button class="btn primary block" id="lgBtn" style="margin-top:14px">Entrar</button>
  <button id="lgToggle">¿No tienes cuenta? Crear cuenta nueva</button>
  <button class="link" id="lgSkip" style="margin:20px auto 0;display:block;font-size:13px">Continuar sin cuenta (solo este aparato)</button>
  <p id="lgMsg" class="tiny" style="text-align:center;margin-top:14px;color:var(--rose);min-height:18px"></p>
</div>

<!-- ===================== APP ===================== -->
<div id="app" class="hidden">
<div id="fixedHeader" style="position:fixed;top:0;left:0;right:0;max-width:560px;margin:0 auto;z-index:30;">
  <div class="topbar">
    <div class="brand"><div class="logo">🍉</div><span id="bizName">Frutería</span></div>
    <div class="spacer"></div>
    <div class="sync-pill" id="syncPill" onclick="openCloud()"><span class="sync-dot" id="syncDot"></span><span id="syncTxt">Local</span></div>
    <button class="icon-btn" onclick="go('mas')">⚙️</button>
  </div>
  <div id="infoBar" style="display:flex;align-items:center;justify-content:space-between;
    padding:6px 16px;background:rgba(255,255,255,.97);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);font-size:13px;color:var(--muted)">
    <span id="infoGreet">👋 Bienvenido</span>
    <span id="infoClima" style="font-weight:600">—</span>
  </div>
</div>

  <main id="main"></main>

  <div id="ticketBar" class="ticket-bar hidden">
    <div class="inner" onclick="openCobro()">
      <div><div class="tt" id="ticketCount">0 productos</div><div class="tv money" id="ticketTotal">$0</div></div>
      <div class="go">Cobrar →</div>
    </div>
  </div>

  <nav class="nav">
    <button data-v="inteligencia" onclick="go('inteligencia')"><span class="ni">📊</span>Resumen</button>
    <button data-v="inventario" onclick="go('inventario')"><span class="ni">📦</span>Inventario</button>
    <button class="sell" data-v="vender" onclick="go('vender')"><span class="ni">🛒</span>Vender</button>
    <button data-v="movimientos" onclick="go('movimientos')"><span class="ni">🔄</span>Movimientos</button>
    <button data-v="mas" onclick="go('mas')"><span class="ni">⋯</span>Más</button>
  </nav>
</div>

<div id="modalRoot"></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

function seedDemo(s){
  const bid=s.business.id;
  const ps=s.productos;
  const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1)+a);
  const rndF=(a,b)=>Math.round((Math.random()*(b-a)+a)*10)/10;
  const dateAgo=(days,h,m=0)=>{const d=new Date();d.setDate(d.getDate()-days);d.setHours(h,m,0,0);return d.toISOString();};

  // ── CLIENTES ──────────────────────────────────────────────────────────
  const clientesSeed=[
    {nombre:'María Garza',    tel:'8112345678'},
    {nombre:'Roberto Sánchez',tel:'8119876543'},
    {nombre:'Carmen López',   tel:'8113456789'},
    {nombre:'Juan Martínez',  tel:'8118765432'},
    {nombre:'Lupita Flores',  tel:'8114567890'},
  ];
  const cls=clientesSeed.map((c,i)=>({id:'demo-cli-'+(i+1),business_id:bid,num_cliente:i+1,nombre:c.nombre,
    telefono:c.tel,num_visitas:0,total_compras:0,ultima_visita:null,notas:'',deleted:false,updated_at:now()}));
  s.clientes=cls;
  s.config.nextNumCliente=cls.length+1;

  // ── COMPRAS (1 por semana, 6 semanas) ────────────────────────────────
  const proveedores=['Central de Abastos','Mercado Juárez','Proveedor del Valle'];
  for(let w=6;w>=0;w--){
    const dia=w*7+rnd(0,2);
    const items=ps.filter((_,i)=>i%3!==w%3).slice(0,rnd(6,10)).map(p=>{
      const cant=rnd(20,80);const costo=p.costo*rndF(0.9,1.1);
      return {producto_id:p.id,nombre:p.nombre,unidad:p.unidad,cantidad:cant,costo,subtotal:Math.round(cant*costo*100)/100};});
    const total=items.reduce((a,i)=>a+i.subtotal,0);
    s.compras.push({id:uid(),business_id:bid,fecha:dateAgo(dia,7,rnd(0,59)),
      proveedor:proveedores[w%3],items,total:Math.round(total),usuario:'Dueño',deleted:false,updated_at:now()});
  }

  // ── VENTAS (últimos 45 días) ─────────────────────────────────────────
  // Peso por hora (pico 10-12h y 17-19h)
  const horaW=[0,0,0,0,0,0,1,2,3,5,7,7,5,4,3,3,4,6,7,5,3,2,1,0];
  // Peso por día semana (0=dom,1=lun...) — mejor vie/sab/mar
  const diaW=[3,5,6,4,4,7,8];
  let folio=s.config.folio;
  const clientIds=cls.map(c=>c.id);
  const productList=ps.filter(p=>p.activo);

  for(let d=44;d>=0;d--){
    const dayOfWeek=new Date(Date.now()-d*86400000).getDay();
    const nVentas=Math.max(0,Math.round(diaW[dayOfWeek]*rndF(0.7,1.4)));
    for(let v=0;v<nVentas;v++){
      // hora con peso
      let hr=0; const r=Math.random()*horaW.reduce((a,b)=>a+b,0); let cum=0;
      for(let h=0;h<24;h++){cum+=horaW[h];if(r<cum){hr=h;break;}}
      const nProds=rnd(1,4);
      const prods=productList.sort(()=>Math.random()-0.5).slice(0,nProds);
      const items=prods.map(p=>{
        const cant=p.unidad==='kg'?rndF(0.5,3):rnd(1,5);
        return {producto_id:p.id,nombre:p.nombre,emoji:p.emoji,unidad:p.unidad,
          cantidad:cant,precio:p.precio_venta,costo:p.costo,
          subtotal:Math.round(cant*p.precio_venta*100)/100};});
      const subtotal=items.reduce((a,i)=>a+i.subtotal,0);
      const descuento=Math.random()<0.05?rnd(5,20):0;
      const total=Math.max(0,subtotal-descuento);
      const costoTotal=items.reduce((a,i)=>a+i.costo*i.cantidad,0);
      const metodo=Math.random()<0.8?'efectivo':'tarjeta';
      // asignar cliente en ~30% de ventas
      const conCliente=Math.random()<0.30;
      const clienteIdx=conCliente?rnd(0,cls.length-1):-1;
      const venta={id:uid(),business_id:bid,folio:folio++,
        fecha:dateAgo(d,hr,rnd(0,59)),items,subtotal:Math.round(subtotal*100)/100,
        descuento,total:Math.round(total*100)/100,costo_total:Math.round(costoTotal*100)/100,
        metodo_pago:metodo,usuario:'Dueño',
        cliente_id:clienteIdx>=0?clientIds[clienteIdx]:null,
        cliente_nombre:clienteIdx>=0?cls[clienteIdx].nombre:null,
        deleted:false,updated_at:now()};
      s.ventas.push(venta);
      // actualizar stats del cliente
      if(clienteIdx>=0){
        cls[clienteIdx].num_visitas=(cls[clienteIdx].num_visitas||0)+1;
        cls[clienteIdx].total_compras=(cls[clienteIdx].total_compras||0)+total;
        cls[clienteIdx].ultima_visita=venta.fecha;
        cls[clienteIdx].updated_at=now();}
      // ajustar stock del producto (baja con ventas)
      items.forEach(i=>{const p=ps.find(x=>x.id===i.producto_id);
        if(p)p.stock=Math.max(0,Math.round((p.stock-i.cantidad*0.3)*10)/10);});
    }
  }
  s.config.folio=folio;

  // ── MERMAS (últimos 45 días, ~1-2 por semana) ───────────────────────
  const motivos=['podrido','golpeado','vencido','aplastado','temperatura'];
  const perecederos=ps.filter(p=>p.perecedero);
  for(let d=44;d>=0;d-=rnd(2,5)){
    const p=perecederos[rnd(0,perecederos.length-1)];
    const cant=p.unidad==='kg'?rndF(0.5,3):rnd(1,6);
    const valPerdido=Math.round(cant*p.costo*100)/100;
    s.mermas.push({id:uid(),business_id:bid,fecha:dateAgo(d,rnd(8,18)),
      producto_id:p.id,nombre:p.nombre,emoji:p.emoji||'🍎',unidad:p.unidad,cantidad:cant,costo:p.costo,
      valor_perdido:valPerdido,motivo:motivos[rnd(0,motivos.length-1)],
      usuario:'Dueño',deleted:false,updated_at:now()});
    // ajustar stock por merma
    p.stock=Math.max(0,Math.round((p.stock-cant*0.5)*10)/10);
  }

  // ── CAJA (apertura + cierre diario, últimos 15 días) ─────────────────
  for(let d=14;d>=0;d--){
    const dayOfWeek=new Date(Date.now()-d*86400000).getDay();
    if(dayOfWeek===0&&d>2)continue; // domingos solo recientes
    const fondo=rnd(400,600);
    s.caja.push({id:uid(),business_id:bid,fecha:dateAgo(d,rnd(9,10),rnd(0,30)),
      tipo:'apertura',monto:fondo,concepto:'Fondo inicial del día',usuario:'Dueño',deleted:false,updated_at:now()});
    if(d>0){// cierre solo para días pasados
      const ventasDelDia=s.ventas.filter(v=>new Date(v.fecha).toDateString()===new Date(Date.now()-d*86400000).toDateString()&&v.metodo_pago==='efectivo');
      const totalEf=ventasDelDia.reduce((a,v)=>a+v.total,0);
      s.caja.push({id:uid(),business_id:bid,fecha:dateAgo(d,rnd(19,20),rnd(0,30)),
        tipo:'cierre',monto:fondo+totalEf,concepto:'Corte del día',usuario:'Dueño',deleted:false,updated_at:now()});
    }
    // gastos pequeños algunos días
    if(Math.random()<0.3){
      s.caja.push({id:uid(),business_id:bid,fecha:dateAgo(d,rnd(14,17)),
        tipo:'salida',monto:rnd(50,200),concepto:['Bolsas','Hielo','Limpieza','Caja chica'][rnd(0,3)],
        usuario:'Dueño',deleted:false,updated_at:now()});
    }
  }
}

// unidades vendidas de un producto entre dos fechas
function soldUnits(pid, fromDate){let s=0;
  ventas().forEach(v=>{ if(new Date(v.fecha)>=fromDate) (v.items||[]).forEach(i=>{if(i.producto_id===pid)s+=+i.cantidad||0;});});
  return s;}
// días de inventario restantes según ritmo de venta (últimos 14 días)
function diasInventario(p){const u=soldUnits(p.id,daysAgo(14));const diario=u/14;
  if(diario<=0) return Infinity; return p.stock/diario;}
// Solo es "riesgo" si hay historial de ventas Y el ritmo no alcanza para liquidar el stock antes de que expire
function enRiesgo(p){ if(!p.perecedero||p.stock<=0) return false;
  const vendidos=soldUnits(p.id,daysAgo(14));
  if(vendidos===0) return false;  // sin ventas = sin ritmo = no podemos calcular riesgo
  const dias=diasInventario(p); return isFinite(dias)&&dias>(p.vida_util_dias||5);}

function rangeStats(fromDate){
  let total=0,costo=0,n=0;const byProd={};
  ventas().forEach(v=>{ if(new Date(v.fecha)>=fromDate){ total+=+v.total||0; costo+=+v.costo_total||0; n++;
    (v.items||[]).forEach(i=>{const k=i.producto_id||i.nombre;
      byProd[k]=byProd[k]||{nombre:i.nombre,emoji:(findP(i.producto_id)||{}).emoji||'🍎',ingreso:0,ganancia:0,unid:0,unidad:i.unidad};
      byProd[k].ingreso+=+i.subtotal||0; byProd[k].ganancia+=(+i.subtotal||0)-((+i.costo||0)*(+i.cantidad||0));
      byProd[k].unid+=+i.cantidad||0;});}});
  let merma=0; mermas().forEach(x=>{if(new Date(x.fecha)>=fromDate)merma+=+x.valor_perdido||0;});
  return {total,costo,ganancia:total-costo,n,ticket:n?total/n:0,merma,byProd};
}

function aggHora(){
  const h=Array(24).fill(0).map((_,i)=>({h:i,v:0,n:0}));
  ventas().forEach(v=>{const hr=new Date(v.fecha).getHours();h[hr].v+=v.total;h[hr].n++;});
  return h;}

function aggDia(){
  const D=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const d=D.map((n,i)=>({n,v:0,g:0,cnt:0}));
  ventas().forEach(v=>{const di=new Date(v.fecha).getDay();d[di].v+=v.total;d[di].g+=(v.total-(v.costo_total||0));d[di].cnt++;});
  return d;}

function aggMes(nm=6){
  const r=[];
  for(let i=nm-1;i>=0;i--){
    const ref=new Date();ref.setDate(1);ref.setMonth(ref.getMonth()-i);
    const y=ref.getFullYear(),m=ref.getMonth();
    const lbl=ref.toLocaleDateString('es-MX',{month:'short'}).replace('.','');
    const vs=ventas().filter(v=>{const d=new Date(v.fecha);return d.getFullYear()===y&&d.getMonth()===m;});
    const ms=mermas().filter(v=>{const d=new Date(v.fecha);return d.getFullYear()===y&&d.getMonth()===m;});
    const cs=compras().filter(v=>{const d=new Date(v.fecha);return d.getFullYear()===y&&d.getMonth()===m;});
    r.push({lbl,
      ventas:vs.reduce((a,v)=>a+v.total,0),
      ganancia:vs.reduce((a,v)=>a+v.total-(v.costo_total||0),0),
      merma:ms.reduce((a,m)=>a+m.valor_perdido,0),
      gastos:cs.reduce((a,c)=>a+c.total,0),
      clientes:new Set(vs.filter(v=>v.cliente_id).map(v=>v.cliente_id)).size,
      n:vs.length});}
  return r;}

window._barTap=function(id,lbl,val){
  const el=document.getElementById(id+'_hdr');
  if(el){el.textContent=lbl+' · '+val;el.style.opacity='1';}};

function svgBars(vals,lbls,opts={}){
  const {color='#1f9d55',h=80,active=-1,chartId='chart'}=opts;
  const max=Math.max(...vals,1);
  const n=vals.length;
  const W=360,PB=16,PT=8;
  const gap=W/n,bW=Math.max(4,gap*0.55);
  // Lineas guia punteadas en 25/50/75 y linea base en 100%
  const guides=[0.25,0.5,0.75,1].map(f=>{
    const y=(PT+h-f*h).toFixed(1);
    const dash=f<1?'stroke-dasharray="4,3" opacity="0.35"':'opacity="0.2"';
    return `<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="#888" stroke-width="${f===1?'1':'0.6'}" ${dash}/>`;}).join('');
  const bars=vals.map((v,i)=>{
    const bh=Math.max(0,(v/max)*h);
    const x=i*gap+(gap-bW)/2;
    const y=PT+h-bh;
    const isActive=active===i;
    const fill=isActive?'#f59e0b':color;
    const opacity=v>0?1:0.12;
    // Sin labels dentro del SVG — se muestran en el hdr div externo
    return `<g opacity="${opacity}" onclick="window._barTap('${chartId}','${lbls[i]||i+'h'}','${money0(v)}')" style="cursor:pointer">
      <rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bW.toFixed(1)}" height="${bh.toFixed(1)}" fill="${fill}" rx="2"/>
    </g>`;}).join('');
  const xlbls=lbls.map((l,i)=>l?
    `<text x="${(i*gap+gap/2).toFixed(1)}" y="${(PT+h+PB-1).toFixed(1)}" text-anchor="middle"
     font-size="9" fill="${active===i?'#f59e0b':'#bbb'}" font-weight="${active===i?'700':'400'}">${l}</text>`:'').join('');
  // Hdr muestra el pico por defecto
  const peakLbl=active>=0&&vals[active]>0?`${lbls[active]||active+'h'} · ${money0(vals[active])}`:'';
  return `<div>
    <div id="${chartId}_hdr" style="text-align:center;font-size:12px;font-weight:700;color:${color};
      height:16px;margin-bottom:4px;opacity:${peakLbl?'1':'0'}">${peakLbl}</div>
    <svg viewBox="0 0 ${W} ${PT+h+PB}" width="100%" style="display:block">${guides}${bars}${xlbls}</svg>
  </div>`;
}

function svgLines(series,lbls,h=120){
  const W=380,PL=44,PR=8,PT=8,PB=18;
  const cW=W-PL-PR;const n=lbls.length;
  if(n<2)return `<div style="padding:24px 0;text-align:center;color:var(--muted);font-size:13px">Registra ventas para ver la tendencia mensual</div>`;
  const allV=series.flatMap(s=>s.values.filter(v=>isFinite(v)));
  const maxV=Math.max(...allV,1);
  // Detectar si hay métricas de conteo (clientes) vs dinero
  const hasCount=series.some(s=>s.isMoney===false);
  const hasOnlyCount=series.every(s=>s.isMoney===false);
  const yFmt=v=>hasOnlyCount?Math.round(v).toString():moneyK(v);
  const xp=i=>PL+i*(cW/(n-1));
  const yp=v=>PT+h-Math.max(0,Math.min(v/maxV,1))*h;
  const grid=[0,0.5,1].map(f=>{
    const y=(PT+h-f*h).toFixed(1);
    return `<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#f0f0f0" stroke-width="1"/>
      <text x="${(PL-4).toFixed(1)}" y="${(parseFloat(y)+3.5).toFixed(1)}" text-anchor="end" font-size="8.5" fill="#ccc">${yFmt(maxV*f)}</text>`;}).join('');
  const lines=series.map(s=>{
    const pts=s.values.map((v,i)=>`${xp(i).toFixed(1)},${yp(v).toFixed(1)}`).join(' ');
    const a=`M ${xp(0).toFixed(1)},${yp(s.values[0]).toFixed(1)} ${s.values.slice(1).map((v,i)=>`L ${xp(i+1).toFixed(1)},${yp(v).toFixed(1)}`).join(' ')} L ${xp(n-1).toFixed(1)},${(PT+h).toFixed(1)} L ${PL},${(PT+h).toFixed(1)} Z`;
    const dots=s.values.map((v,i)=>`<circle cx="${xp(i).toFixed(1)}" cy="${yp(v).toFixed(1)}" r="3.5" fill="${s.color}" stroke="white" stroke-width="1.5"/>`).join('');
    return `<path d="${a}" fill="${s.color}" fill-opacity="0.07"/>
      <polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}`;}).join('');
  const xlbls=lbls.map((l,i)=>`<text x="${xp(i).toFixed(1)}" y="${(PT+h+PB-1).toFixed(1)}" text-anchor="${i===0?'start':i===n-1?'end':'middle'}" font-size="9" fill="#aaa">${l}</text>`).join('');
  // Nota si hay mezcla de tipos
  const nota=hasCount&&!hasOnlyCount?`<text x="${(W/2).toFixed(1)}" y="${(PT-2).toFixed(1)}" text-anchor="middle" font-size="8" fill="#aaa">* Clientes en conteo, resto en $</text>`:'';
  return `<svg viewBox="0 0 ${W} ${PT+h+PB}" width="100%" style="display:block">${nota}${grid}${lines}${xlbls}</svg>`;}

function dashTips(mes,horaAgg,diaAgg,s30){
  const tips=[];
  if(ventas().length===0){
    tips.push({ico:'🚀',txt:'Empieza registrando tus ventas del día con el botón Vender. Aquí verás estadísticas reales de tu negocio.'});
    return tips;}
  // Merma alta
  if(s30.total>0&&s30.merma/s30.total>0.08)
    tips.push({ico:'⚠️',txt:`Tu merma representa el ${(s30.merma/s30.total*100).toFixed(0)}% de tus ventas. Compra menos cantidad de los productos que más se pierden y rota el inventario más rápido.`});
  // Hora pico
  const ph=horaAgg.filter(h=>h.v>0);
  if(ph.length){const best=ph.reduce((b,h)=>h.v>b.v?h:b);
    tips.push({ico:'🕐',txt:`Tu hora pico de ventas es ${best.h}:00–${best.h+1}:00. Asegúrate de tener inventario completo antes de esa hora.`});}
  // Mejor día
  const pd=diaAgg.filter(d=>d.v>0);
  if(pd.length>=2){
    const bd=pd.reduce((b,d)=>d.v>b.v?d:b);
    const wd=pd.reduce((w,d)=>d.v<w.v?d:w);
    tips.push({ico:'📅',txt:`${bd.n} es tu mejor día. ${wd.n!==bd.n?`El ${wd.n} es más flojo — buen momento para reabastecer y acomodar.`:''}`});}
  // Tendencia mensual
  if(mes.length>=2){
    const l=mes[mes.length-1],p=mes[mes.length-2];
    if(p.ventas>0){const chg=((l.ventas-p.ventas)/p.ventas*100);
      if(chg>10)tips.push({ico:'📈',txt:`Tus ventas subieron ${chg.toFixed(0)}% este mes vs el anterior. ¡Buen ritmo — sigue así!`});
      else if(chg<-10)tips.push({ico:'📉',txt:`Tus ventas bajaron ${Math.abs(chg).toFixed(0)}% vs el mes anterior. Revisa precios, horarios o promociones.`});}}
  // Pocos clientes
  const nc=(state.clientes||[]).filter(c=>!c.deleted).length;
  if(nc<5)tips.push({ico:'👤',txt:`Solo tienes ${nc} cliente${nc===1?'':'s'} registrado${nc===1?'':'s'}. Pide el número de WhatsApp al vender — los clientes frecuentes son tu mejor negocio.`});
  // Bajo margen
  const bm=productos().filter(p=>p.activo&&margenPct(p)<15&&margenPct(p)>0).slice(0,1);
  if(bm.length)tips.push({ico:'💡',txt:`${bm[0].nombre} tiene un margen de solo ${margenPct(bm[0]).toFixed(0)}%. Intenta subir el precio o negociar mejor el costo con tu proveedor.`});
  return tips.slice(0,4);}

const DIAS_FULL=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const DIAS_SHORT=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

// Análisis profundo por producto: demanda por día de semana + hora pico
function analizarProducto(pid, dias=42){
  const desde=daysAgo(dias);
  const porDia=Array(7).fill(0).map(()=>({unid:0,ventas:0,horas:Array(24).fill(0)}));
  let totalUnid=0, totalVentas=0;
  ventas().forEach(v=>{
    const f=new Date(v.fecha); if(f<desde)return;
    (v.items||[]).forEach(i=>{
      if(i.producto_id!==pid)return;
      const dia=f.getDay(), hr=f.getHours();
      porDia[dia].unid+=+i.cantidad||0;
      porDia[dia].ventas++;
      porDia[dia].horas[hr]+=+i.cantidad||0;
      totalUnid+=+i.cantidad||0; totalVentas++;
    });
  });
  // Cuántas semanas de datos hay
  const semanas=Math.max(1,Math.ceil(dias/7));
  // Promedio por día de semana
  const promDia=porDia.map((d,i)=>({
    dia:i, unidPorSemana:d.unid/semanas, ventas:d.ventas,
    horaPico:d.horas.indexOf(Math.max(...d.horas)),
    pico:Math.max(...d.horas)
  }));
  const avgDiario=totalUnid/dias;
  return {pid, totalUnid, totalVentas, avgDiario, promDia, semanas};
}

// Detecta el día más fuerte de un producto vs su promedio
function diaFuerteProducto(analisis){
  const {promDia}=analisis;
  const avg=promDia.reduce((a,d)=>a+d.unidPorSemana,0)/7;
  if(avg<=0)return null;
  const mejor=promDia.reduce((b,d)=>d.unidPorSemana>b.unidPorSemana?d:b,promDia[0]);
  const ratio=mejor.unidPorSemana/avg;
  // Solo es "fuerte" si vende al menos 50% más que el promedio y tiene datos
  if(ratio<1.5||mejor.ventas<2)return null;
  return {dia:mejor.dia, unidPorSemana:mejor.unidPorSemana, ratio, horaPico:mejor.horaPico, pico:mejor.pico};
}

// Genera todos los insights accionables, ordenados por urgencia
function generarInsights(){
  const out=[];
  const ps=productos().filter(p=>p.activo);
  const hoy=new Date().getDay();
  const manana=(hoy+1)%7;

  // ── 1. PATRONES DE DEMANDA POR DÍA (preventivo de stock) ──────────────
  ps.forEach(p=>{
    const a=analizarProducto(p.id);
    if(a.totalVentas<5)return; // pocos datos
    const df=diaFuerteProducto(a);
    if(!df)return;
    const stockNecesario=Math.ceil(df.unidPorSemana*1.15); // 15% buffer
    const esHoy=df.dia===hoy, esManana=df.dia===manana;
    const horaTxt=df.horaPico>0?` (pico ${df.horaPico}:00h)`:'';
    out.push({
      tipo:'demanda',
      urgencia: esHoy?100 : esManana?90 : 40,
      emoji:p.emoji,
      titulo:`${DIAS_FULL[df.dia]}: día fuerte de ${p.nombre}`,
      texto:`Vendes ${df.unidPorSemana.toFixed(1)} ${p.unidad} los ${DIAS_SHORT[df.dia].toLowerCase()}${horaTxt} — ${df.ratio.toFixed(1)}× tu promedio. Asegura ≥${stockNecesario} ${p.unidad} ese día.${esHoy?' ⚠️ ES HOY':esManana?' 📅 Es mañana':''}`,
      stockNecesario, stockActual:p.stock
    });
  });

  // ── 2. RIESGO DE MERMA (sobre-stock perecedero) ───────────────────────
  ps.forEach(p=>{
    if(!p.perecedero||p.stock<=0)return;
    const a=analizarProducto(p.id);
    if(a.avgDiario<=0){
      // Perecedero con stock pero SIN ventas recientes = riesgo alto
      if(p.stock>0)out.push({
        tipo:'merma_sin_venta', urgencia:85, emoji:p.emoji,
        titulo:`${p.nombre}: sin ventas pero con stock`,
        texto:`Tienes ${qty(p.stock,p.unidad)} de ${p.nombre} (perecedero, vida ${p.vida_util_dias||5}d) pero no se ha vendido en 2 semanas. Riesgo de pérdida: ${money(p.stock*p.costo)}. Considera promoción o bajar precio.`
      });
      return;
    }
    const diasParaVender=p.stock/a.avgDiario;
    const vida=p.vida_util_dias||5;
    if(diasParaVender>vida){
      const seVencera=p.stock-(a.avgDiario*vida);
      const perdida=seVencera*p.costo;
      out.push({
        tipo:'merma', urgencia:75, emoji:p.emoji,
        titulo:`${p.nombre}: vas a perder producto`,
        texto:`Tienes ${qty(p.stock,p.unidad)} pero solo vendes ${a.avgDiario.toFixed(1)} ${p.unidad}/día. Al ritmo actual ~${qty(seVencera,p.unidad)} se van a echar a perder antes de venderse (≈${money(perdida)}). Baja el precio o haz combo.`
      });
    }
  });

  // ── 3. PREDICCIÓN DE AGOTAMIENTO (quedarse sin stock) ─────────────────
  ps.forEach(p=>{
    const a=analizarProducto(p.id);
    if(a.avgDiario<=0||p.stock<=0)return;
    const diasRestantes=p.stock/a.avgDiario;
    if(diasRestantes<=2 && p.stock>0){
      out.push({
        tipo:'agotamiento', urgencia:70, emoji:p.emoji,
        titulo:`${p.nombre}: se agota pronto`,
        texto:`Te queda ${qty(p.stock,p.unidad)} (~${diasRestantes.toFixed(1)} días al ritmo actual). Reabastece pronto para no perder ventas.`
      });
    }
  });

  // ── 4. PRODUCTOS LENTOS (capital estancado) ───────────────────────────
  const lentos=ps.filter(p=>{
    const a=analizarProducto(p.id);
    return a.totalVentas>0 && a.avgDiario<0.3 && p.stock>0 && (p.stock*p.costo)>100;
  }).map(p=>{const a=analizarProducto(p.id);return {p,a};})
    .sort((x,y)=>(y.p.stock*y.p.costo)-(x.p.stock*x.p.costo)).slice(0,2);
  lentos.forEach(({p,a})=>{
    out.push({
      tipo:'lento', urgencia:30, emoji:p.emoji,
      titulo:`${p.nombre}: rotación lenta`,
      texto:`Tienes ${money(p.stock*p.costo)} en stock de ${p.nombre} pero se vende lento (${a.avgDiario.toFixed(1)} ${p.unidad}/día). Considera reducir cuánto compras o promocionarlo.`
    });
  });

  // ── 5. PRODUCTO ESTRELLA (reforzar lo que funciona) ───────────────────
  const conVentas=ps.map(p=>({p,a:analizarProducto(p.id)})).filter(x=>x.a.totalVentas>=5);
  if(conVentas.length){
    const estrella=conVentas.reduce((b,x)=>x.a.totalUnid>b.a.totalUnid?x:b,conVentas[0]);
    out.push({
      tipo:'estrella', urgencia:20, emoji:estrella.p.emoji,
      titulo:`${estrella.p.nombre} es tu producto estrella`,
      texto:`Vendiste ${estrella.a.totalUnid.toFixed(0)} ${estrella.p.unidad} en 6 semanas. Nunca lo dejes faltar — es lo que más mueve tu negocio.`
    });
  }

  return out.sort((a,b)=>b.urgencia-a.urgencia);
}

function vAsesor(){
  const insights=generarInsights();
  const hoy=DIAS_FULL[new Date().getDay()];
  // Agrupar por tipo
  const grupos={
    demanda:{titulo:'📅 Prepárate por día',sub:'Asegura stock en tus días fuertes',items:[]},
    merma:{titulo:'🗑️ Evita perder producto',sub:'Stock que no alcanzarás a vender',items:[]},
    merma_sin_venta:{titulo:'🗑️ Evita perder producto',sub:'',items:[]},
    agotamiento:{titulo:'⚠️ Reabastece pronto',sub:'Productos por agotarse',items:[]},
    lento:{titulo:'🐌 Rotación lenta',sub:'Capital estancado',items:[]},
    estrella:{titulo:'⭐ Tus ganadores',sub:'Lo que más mueve tu negocio',items:[]}
  };
  insights.forEach(i=>{
    const g=i.tipo==='merma_sin_venta'?'merma':i.tipo;
    if(grupos[g])grupos[g].items.push(i);
  });

  const card=i=>{
    const color=i.urgencia>=90?'#dc2626':i.urgencia>=70?'#f59e0b':i.urgencia>=40?'#0891b2':'#16a34a';
    const bg=i.urgencia>=90?'#fef2f2':i.urgencia>=70?'#fffbeb':i.urgencia>=40?'#f0f9ff':'#f0fdf4';
    return `<div style="display:flex;gap:11px;padding:13px;background:${bg};border-radius:12px;
      margin-bottom:8px;border-left:3px solid ${color}">
      <span style="font-size:24px;flex-shrink:0">${i.emoji}</span>
      <div style="flex:1;min-width:0">
        <div style="font-weight:800;font-size:14px;margin-bottom:3px;color:${color}">${i.titulo}</div>
        <div style="font-size:13px;line-height:1.4;color:var(--ink)">${i.texto}</div>
      </div>
    </div>`;};

  let body='';

  // ── DEMANDA: tabla semanal agrupada por día (más útil que 12 tarjetas) ──
  if(grupos.demanda.items.length){
    const hoyIdx=new Date().getDay();
    const porDia={};
    grupos.demanda.items.forEach(i=>{
      const dia=DIAS_FULL.findIndex(df=>i.titulo.includes(df));
      if(dia>=0){porDia[dia]=porDia[dia]||[];porDia[dia].push(i);}
    });
    body+=`<div class="sec-title" style="margin-top:18px">📅 Plan semanal de stock</div>
      <div class="tiny muted" style="margin:-4px 0 8px 2px">Asegura estos productos en tus días fuertes</div>`;
    const ordenDias=[];
    for(let off=0;off<7;off++)ordenDias.push((hoyIdx+off)%7);
    ordenDias.forEach(dia=>{
      if(!porDia[dia]||!porDia[dia].length)return;
      const esHoy=dia===hoyIdx, esManana=dia===(hoyIdx+1)%7;
      const tag=esHoy?'<span style="background:#dc2626;color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:800;margin-left:6px">HOY</span>':
                esManana?'<span style="background:#f59e0b;color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:800;margin-left:6px">MAÑANA</span>':'';
      const bg=esHoy?'#fef2f2':esManana?'#fffbeb':'#fff';
      const border=esHoy?'#dc2626':esManana?'#f59e0b':'var(--line)';
      const rows=porDia[dia].map(i=>{
        const m=i.texto.match(/Asegura ≥(\d+) (\w+)/);
        const stock=m?`${m[1]} ${m[2]}`:'';
        const horaM=i.texto.match(/pico (\d+):00h/);
        const hora=horaM?`${horaM[1]}:00h`:'';
        const nombre=i.titulo.split(': día fuerte de ')[1]||i.titulo;
        return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--line)">
          <span style="font-size:20px">${i.emoji}</span>
          <div style="flex:1;font-size:13px;font-weight:600">${nombre}</div>
          ${hora?`<span class="tiny muted">${hora}</span>`:''}
          <span style="font-weight:800;font-size:13px;color:var(--green-d)">≥${stock}</span>
        </div>`;}).join('');
      body+=`<div style="background:${bg};border:1.5px solid ${border};border-radius:12px;padding:12px;margin-bottom:8px">
        <div style="font-weight:800;font-size:14px">${DIAS_FULL[dia]}${tag}</div>
        ${rows}
      </div>`;
    });
  }

  // ── Resto de grupos como tarjetas individuales ──
  ['merma','agotamiento','lento','estrella'].forEach(key=>{
    const g=grupos[key];
    if(!g.items.length)return;
    body+=`<div class="sec-title" style="margin-top:18px">${g.titulo}</div>
      ${g.sub?`<div class="tiny muted" style="margin:-4px 0 8px 2px">${g.sub}</div>`:''}
      ${g.items.map(card).join('')}`;
  });

  if(!insights.length){
    body=`<div class="empty" style="padding:40px 20px">
      <span class="e-ico">🔮</span>
      <div style="font-weight:700;margin-bottom:6px">Aún reuniendo datos</div>
      <div class="tiny muted">Registra más ventas durante unos días y aquí verás patrones,
      predicciones de stock y consejos para reducir merma.</div></div>`;
  }

  return `<button class="link" onclick="go('inteligencia')">← Resumen</button>
  <div class="sec-title" style="margin-bottom:2px">Asesor inteligente</div>
  <div class="tiny muted" style="margin:0 0 4px 2px">Análisis de tus patrones de venta · ${hoy}</div>
  ${body}
  <div style="height:20px"></div>`;
}

function vInteligencia(){
  const hoy=rangeStats(startOfDay(new Date()));
  const s7=rangeStats(daysAgo(7));
  const s30=rangeStats(daysAgo(30));

function posCards(list){return list.map(p=>{const out=p.stock<=0;const low=!out&&p.stock<=p.stock_min;

    ${out?'<span class="badge">Agotado</span>':low?'<span class="badge low">Poco</span>':''}
    <span class="pemj">${p.emoji}</span>
    <div class="pn">${p.nombre}</div>
    <div class="pp money">${money0(p.precio_venta)}</div>
    <div class="pu">por ${p.unidad==='kg'?'kg':unitShort(p.unidad,1)}</div>
  </button>`;}).join('');}
function updatePosGrid(){let list=productos().filter(p=>p.activo);
  if(posCat!=='Todo')list=list.filter(p=>p.categoria===posCat);
  if(posSearch)list=list.filter(p=>p.nombre.toLowerCase().includes(posSearch.toLowerCase()));
  $('#posGrid').innerHTML=posCards(list);}

/* ----- modal cantidad ----- */
function openQty(pid){const p=findP(pid);let mode=p.unidad==='kg'?'peso':'pieza';let val=p.unidad==='kg'?0:1;
  const render2=()=>{
    let total = mode==='dinero' ? val : (mode==='peso'? val*p.precio_venta : val*p.precio_venta);
    let cantidad = mode==='dinero' ? (p.precio_venta>0?val/p.precio_venta:0) : val;
    const html=`
    <div class="qty-display">
      <div class="qd-emj">${p.emoji}</div>
      <div class="qd-n">${p.nombre} · ${money0(p.precio_venta)}/${p.unidad==='kg'?'kg':unitShort(p.unidad,1)}</div>
      <div class="qd-big money">${money(total)}</div>
      <div class="qd-sub">${qty(cantidad,p.unidad)} · quedan ${qty(p.stock,p.unidad)}</div>
    </div>
    ${p.unidad==='kg'?`
      <div class="seg">
        <button class="${mode==='peso'?'on':''}" onclick="window._qmode('peso')">Por peso (kg)</button>
        <button class="${mode==='dinero'?'on':''}" onclick="window._qmode('dinero')">Por dinero ($)</button>
      </div>
      ${mode==='peso'?`<div class="quick">
        ${[0.25,0.5,1,2].map(q=>`<button onclick="window._qset(${q})">${q} kg</button>`).join('')}
       </div>
       <input class="bigin num" id="qInput" inputmode="decimal" placeholder="0.000" value="${val||''}" oninput="window._qinput(this.value)">`
      :`<div class="quick">
        ${[10,20,50,100].map(q=>`<button onclick="window._qset(${q})">$${q}</button>`).join('')}
       </div>
       <input class="bigin num" id="qInput" inputmode="decimal" placeholder="0" value="${val||''}" oninput="window._qinput(this.value)">`}
    `:`
      <div class="stepper">
        <button onclick="window._qstep(-1)">−</button>
        <div class="sv num">${val}</div>
        <button onclick="window._qstep(1)">+</button>
      </div>`}
    <button class="btn primary block" style="margin-top:6px" onclick="window._qadd()">Agregar al ticket</button>`;
    openSheet(html);
    window._qmode=m=>{mode=m;val=m==='pieza'?1:0;render2();};
    window._qset=v=>{val=v;render2();};
    window._qstep=d=>{val=Math.max(1,val+d);render2();};
    window._qinput=v=>{val=parseFloat(v)||0;
      // actualizar solo display sin re-render para no perder foco
      let t=mode==='dinero'?val:val*p.precio_venta;let c=mode==='dinero'?(p.precio_venta>0?val/p.precio_venta:0):val;
      const d=document.querySelector('.qd-big');if(d)d.textContent=money(t);
      const s=document.querySelector('.qd-sub');if(s)s.textContent=`${qty(c,p.unidad)} · quedan ${qty(p.stock,p.unidad)}`;};
    window._qadd=()=>{
      let cantidad = mode==='dinero' ? (p.precio_venta>0?val/p.precio_venta:0) : val;
      if(cantidad<=0){toast('Pon una cantidad','bad');return;}
      const subtotal = mode==='dinero' ? val : cantidad*p.precio_venta;
      const ex=cart.find(c=>c.producto_id===p.id);
      if(ex){ex.cantidad+=cantidad;ex.subtotal=Math.round((ex.cantidad*p.precio_venta)*100)/100;}
      else cart.push({producto_id:p.id,nombre:p.nombre,emoji:p.emoji,unidad:p.unidad,
        precio:p.precio_venta,costo:p.costo,cantidad,subtotal:Math.round(subtotal*100)/100});
      closeSheet();renderTicketBar();toast('Agregado 🛒','ok');};
  };
  render2();
  setTimeout(()=>{const i=$('#qInput');if(i&&p.unidad==='kg'===false&&false)i.focus();},80);
}

function openCobro(){payMethod='efectivo';cartDiscount=0;

   <div class="between" style="padding:4px 2px 14px">
     <span class="muted">Subtotal ${money(sub)}${cartDiscount?` − ${money(cartDiscount)} desc.`:''}</span>
     <span class="bb" style="font-size:22px">Total <span id="cobroTot" class="money">${money(tot)}</span></span>
   </div>
   <label class="field" style="margin-bottom:8px"><label class="b tiny">Método de pago</label></label>
   <div class="pays">
     <button class="${payMethod==='efectivo'?'on':''}" onclick="payMethod='efectivo';window._payUpd()"><span class="pico">💵</span>Efectivo</button>
     <button class="${payMethod==='transferencia'?'on':''}" onclick="payMethod='transferencia';window._payUpd()"><span class="pico">📲</span>Transfer</button>
     <button class="${payMethod==='tarjeta'?'on':''}" onclick="payMethod='tarjeta';window._payUpd()"><span class="pico">💳</span>Tarjeta</button>
   </div>
   <button class="btn primary block" style="margin-top:14px;font-size:17px;padding:16px" onclick="finalizarVenta()">
     Cobrar ${money(tot)}</button>
   <button id="mpBtn" onclick="window._mpCobrar()"
     style="margin-top:8px;width:100%;background:#ffe600;color:#333;border:none;border-radius:14px;
     padding:14px;font-weight:800;font-size:15px;cursor:pointer;display:block">
     🟡 Cobrar con terminal Mercado Pago${!(state.config.mpToken&&state.config.mpDeviceId)?' (configurar →)':''}
   </button>
   `;
   openSheet(html);
   window._cobroUpd=()=>{const t=Math.max(0,cartTotal()-cartDiscount);const e=$('#cobroTot');if(e)e.textContent=money(t);
     const btn=document.querySelector('.sheet .btn.primary');if(btn)btn.textContent='Cobrar '+money(t);};
   window._payUpd=()=>{document.querySelectorAll('.pays button').forEach((b,idx)=>{
     b.classList.toggle('on',['efectivo','transferencia','tarjeta'][idx]===payMethod);});};
  };

function cartDel(i){cart.splice(i,1);renderTicketBar();if(!cart.length){closeSheet();return;}openCobro();}

function finalizarVenta(){
  if(!cart.length)return;
  const sub=cartTotal();const tot=Math.max(0,sub-cartDiscount);
  const costo_total=cart.reduce((a,c)=>a+c.costo*c.cantidad,0);
  const venta={id:uid(),business_id:state.business.id,folio:state.config.folio++,fecha:now(),
    items:cart.map(c=>({producto_id:c.producto_id,nombre:c.nombre,unidad:c.unidad,
      cantidad:c.cantidad,precio:c.precio,costo:c.costo,subtotal:c.subtotal})),
    subtotal:sub,descuento:cartDiscount,total:tot,costo_total,
    metodo_pago:payMethod,usuario:state.member.nombre,deleted:false,updated_at:now()};
  // descontar inventario
  cart.forEach(c=>{const p=findP(c.producto_id);if(p){p.stock=Math.round((p.stock-c.cantidad)*1000)/1000;p.updated_at=now();}});
  state.ventas.push(venta);
  save();push('ventas',venta);cart.forEach(c=>{const p=findP(c.producto_id);if(p)push('productos',p);});
  cart=[];cartDiscount=0;closeSheet();renderTicketBar();
  toast('Venta registrada ✓ '+money(tot),'ok');
  // Ofrecer ticket por WhatsApp
  setTimeout(()=>openWASheet(venta),120);
}

let invSort='alpha'; // 'alpha' | 'mas' | 'menos'
let invSearch='';
let dashSelected=new Set(['ventas','ganancia']);
let rentPreset='30d'; // 'hoy'|'7d'|'30d'|'mes'|'custom'

function _invRows(ps){

        const dc=dias&&isFinite(dias)?(dias<=vidaU*0.5?'var(--rose)':dias<=vidaU?'#f59e0b':'var(--green)'):'var(--green)';

        return `<div class="lrow" onclick="openProd('${p.id}')">
          <span class="l-emj">${p.emoji}</span>

            ${low?'<span class="chip r">Pedir más</span>':''}${risk?'<span class="chip m">Vender pronto</span>':''}</div>
            <div class="l-s">Costo ${money0(p.costo)} · vende ${money0(p.precio_venta)} · margen ${margenPct(p).toFixed(0)}%</div>
            ${diasTxt?`<div class="tiny" style="color:${dc};margin-top:1px">${diasTxt}</div>${diasBar}`:''}
          </div>
          <div class="l-r"><div class="bb num">${qty(p.stock,p.unidad)}</div>
            <div class="tiny faint">${money0(p.stock*p.costo)}</div></div>
        </div>`;}).join('')
    : '<div class="empty" style="padding:20px 0"><span class="e-ico">&#x1F50D;</span>Sin resultados</div>';}


window._invSearch=()=>{
  invSearch=(document.getElementById('invQ')||{value:''}).value.toLowerCase().trim();
  const sortFns={alpha:(a,b)=>a.nombre.localeCompare(b.nombre),mas:(a,b)=>b.stock*b.costo-a.stock*a.costo,menos:(a,b)=>a.stock*a.costo-b.stock*b.costo};
  let ps=productos().filter(p=>p.activo).sort(sortFns[invSort]||sortFns.alpha);
  if(invSearch)ps=ps.filter(p=>p.nombre.toLowerCase().includes(invSearch)||p.categoria.toLowerCase().includes(invSearch));
  const el=document.getElementById('invList');
  if(el)el.innerHTML=_invRows(ps);
};

function vInventario(){
  const sortFns={alpha:(a,b)=>a.nombre.localeCompare(b.nombre),mas:(a,b)=>b.stock*b.costo-a.stock*a.costo,menos:(a,b)=>a.stock*a.costo-b.stock*b.costo};
  let ps=productos().filter(p=>p.activo).sort(sortFns[invSort]||sortFns.alpha);
  const val=ps.reduce((a,p)=>a+p.stock*p.costo,0);

function saveProd(id,exists){
  const nombre=$('#pNombre').value.trim();if(!nombre){toast('Ponle nombre','bad');return;}
  const data={nombre,emoji:$('#pEmoji').value||emojiFor(nombre),categoria:$('#pCat').value,unidad:$('#pUnidad').value,
    costo:parseFloat($('#pCosto').value)||0,precio_venta:parseFloat($('#pPrecio').value)||0,
    stock:parseFloat($('#pStock').value)||0,stock_min:parseFloat($('#pMin').value)||0,
    perecedero:$('#pPere').checked,vida_util_dias:parseInt($('#pVida')?.value)||5,updated_at:now()};
  $('#pPere').onchange=()=>{const w=document.getElementById('pVidaWrap');if(w)w.style.display=$('#pPere').checked?'':'none';};
  let p;
  if(exists){p=findP(id);Object.assign(p,data);}
  else{p={id,business_id:state.business.id,activo:true,deleted:false,vida_util_dias:5,...data};state.productos.push(p);}
  save();push('productos',p);closeSheet();render();toast('Guardado ✓','ok');
}
function delProd(id){const p=findP(id);if(!p)return;
  if(!confirm('¿Eliminar '+p.nombre+'?'))return;
  p.deleted=true;p.updated_at=now();save();push('productos',p);closeSheet();render();toast('Eliminado');
}

let compraCart=[];
function vCompras(){
  return `

    <span class="bb money" style="font-size:22px">${money(compraCart.reduce((a,c)=>a+c.subtotal,0))}</span></div>
    <button class="btn primary block" onclick="guardarCompra()">Guardar compra y subir stock</button>`:''}
  <div style="height:20px"></div>`;
}
function compraItemsHtml(){if(!compraCart.length)return '<div class="empty" style="padding:24px"><span class="e-ico">🧾</span>Agrega lo que compraste</div>';
  return compraCart.map((c,i)=>`<div class="line-item">
    <span class="li-emj">${c.emoji}</span>
    <div class="li-info"><div class="li-n">${c.nombre}</div>
      <div class="li-q">${qty(c.cantidad,c.unidad)} × ${money0(c.costo)} costo</div></div>
    <span class="li-sub money">${money(c.subtotal)}</span>
    <button class="li-x" onclick="compraCart.splice(${i},1);render()">×</button></div>`).join('');
}
function openCompraPick(){const ps=productos().filter(p=>p.activo).sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const html=`<h2>¿Qué compraste?</h2><p class="sub">Elige un producto</p>
  <div class="search">🔎<input id="cpSearch" placeholder="Buscar..." oninput="window._cpFilter(this.value)"></div>
  <div id="cpList" class="card pad" style="max-height:50vh;overflow:auto">${ps.map(p=>cpRow(p)).join('')}</div>
  <button class="btn block" style="margin-top:10px" onclick="closeSheet();openProd()">＋ Es un producto nuevo</button>`;
  openSheet(html);
  window._cpFilter=v=>{const f=ps.filter(p=>p.nombre.toLowerCase().includes(v.toLowerCase()));
    $('#cpList').innerHTML=f.map(p=>cpRow(p)).join('')||'<div class="empty">Sin resultados</div>';};
}
function cpRow(p){return `<div class="lrow" onclick="compraQty('${p.id}')"><span class="l-emj">${p.emoji}</span>
  <div class="l-main"><div class="l-n">${p.nombre}</div><div class="l-s">Costo actual ${money0(p.costo)} · stock ${qty(p.stock,p.unidad)}</div></div>
  <div class="l-r faint">＋</div></div>`;}
function compraQty(pid){const p=findP(pid);let cant=p.unidad==='kg'?0:1;let costo=p.costo;
  const html=`<h2>${p.emoji} ${p.nombre}</h2><p class="sub">¿Cuánto compraste y a qué costo?</p>
  <div class="grid2">
    <div class="field"><label>Cantidad (${p.unidad})</label><input id="ccCant" class="num bigin" style="font-size:24px" inputmode="decimal" value="${cant||''}" placeholder="0"></div>
    <div class="field"><label>Costo por ${p.unidad==='kg'?'kg':unitShort(p.unidad,1)}</label><input id="ccCosto" class="num bigin" style="font-size:24px" inputmode="decimal" value="${costo||''}" placeholder="$0"></div>
  </div>
  <button class="btn primary block" onclick="addCompra('${pid}')">Agregar</button>`;
  openSheet(html);
}
function addCompra(pid){const p=findP(pid);const cantidad=parseFloat($('#ccCant').value)||0;
  const costo=parseFloat($('#ccCosto').value)||0;
  if(cantidad<=0){toast('Pon la cantidad','bad');return;}
  compraCart.push({producto_id:pid,nombre:p.nombre,emoji:p.emoji,unidad:p.unidad,cantidad,costo,
    subtotal:Math.round(cantidad*costo*100)/100});
  closeSheet();render();
}
function guardarCompra(){if(!compraCart.length)return;
  const total=compraCart.reduce((a,c)=>a+c.subtotal,0);
  const compra={id:uid(),business_id:state.business.id,fecha:now(),proveedor:$('#compProv').value||'',
    items:compraCart.map(c=>({producto_id:c.producto_id,nombre:c.nombre,unidad:c.unidad,cantidad:c.cantidad,costo:c.costo,subtotal:c.subtotal})),
    total,usuario:state.member.nombre,deleted:false,updated_at:now()};
  // subir stock + costo promedio ponderado
  compraCart.forEach(c=>{const p=findP(c.producto_id);if(!p)return;
    const stockNuevo=p.stock+c.cantidad;
    if(stockNuevo>0) p.costo=Math.round(((p.stock*p.costo)+(c.cantidad*c.costo))/stockNuevo*100)/100;
    p.stock=Math.round(stockNuevo*1000)/1000;p.updated_at=now();});
  state.compras.push(compra);
  save();push('compras',compra);compraCart.forEach(c=>{const p=findP(c.producto_id);if(p)push('productos',p);});
  compraCart=[];closeSheet&&closeSheet();toast('Compra guardada ✓ stock actualizado','ok');go('inventario');
}

function actividadHtml(){

  ventas().slice(-30).forEach(v=>ev.push({t:v.fecha,ico:'🛒',n:'Venta #'+v.folio,s:(v.items||[]).length+' productos · '+v.metodo_pago,a:'+'+money0(v.total),cls:'pos'}));

function fmtDate(t){const d=new Date(t);const h=new Date();const sameDay=todayKey(d)===todayKey(h);

                : d.toLocaleDateString('es-MX',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});}

function anularVenta(id){const v=ventas().find(x=>x.id===id);if(!v)return;

  v.deleted=true;v.updated_at=now();save();push('ventas',v);closeSheet();render();toast('Venta anulada');
}

window._editQuitarItem=function(idx,id){

window._editSearchProd=function(id){
  const q=(document.getElementById('etSearch')||{value:''}).value.trim().toLowerCase();

  const hits=productos().filter(p=>p.nombre.toLowerCase().includes(q)||p.emoji&&p.emoji.includes(q)).slice(0,5);
  res.innerHTML=hits.map(p=>`
    <button class="lrow" style="width:100%;text-align:left;padding:8px 0" onclick="_editSelProd('${p.id}','${id}')">
      <span class="l-emj">${p.emoji}</span>

      <div class="l-s">${money(p.precio_venta)} / ${p.unidad} · stock: ${p.stock} ${p.unidad}</div></div>
    </button>`).join('');
};

let _etSelProd=null;
window._editSelProd=function(pid,id){
  const p=findP(pid);if(!p)return;
  _etSelProd=p;
  const form=document.getElementById('etAddForm');
  const nom=document.getElementById('etProdNombre');
  const cant=document.getElementById('etCant');
  if(form)form.style.display='block';
  if(nom)nom.textContent=p.nombre+' ('+p.unidad+') · '+money(p.precio_venta)+'/'+p.unidad;
  if(cant){cant.value=p.unidad==='kg'?'1':'1';cant.placeholder=p.unidad==='kg'?'kg':'piezas';}

window._editAgregarProd=function(id){
  if(!_etSelProd)return;
  const p=_etSelProd;
  const cant=parseFloat((document.getElementById('etCant')||{value:'1'}).value)||1;
  const sub=Math.round(cant*p.precio_venta*100)/100;
  _editItems.push({producto_id:p.id,nombre:p.nombre,unidad:p.unidad,
    cantidad:cant,precio:p.precio_venta,costo:p.costo,subtotal:sub,custom:false});
  _etSelProd=null;
  _renderEditTicket(id);
};

window._editAgregarNota=function(id){
  const nom=(document.getElementById('etNotaNombre')||{value:''}).value.trim();
  const precio=parseFloat((document.getElementById('etNotaPrecio')||{value:'0'}).value)||0;
  if(!nom){toast('Pon la descripción de la nota','bad');return;}
  _editItems.push({producto_id:null,nombre:nom,unidad:'pieza',cantidad:1,
    precio,costo:0,subtotal:precio,custom:true});
  _renderEditTicket(id);
};

window._editGuardar=function(id){
  const motivo=(document.getElementById('etMotivo')||{value:''}).value.trim();
  if(!motivo){toast('Escribe el motivo de la edición','bad');document.getElementById('etMotivo')?.focus();return;}
  const v=ventas().find(x=>x.id===id);if(!v)return;

  // ── Calcular diff legible ───────────────────────────────────────────────
  const oldItems=v.items||[];const newItems=_editItems;
  const cambios=[];
  // Productos quitados
  oldItems.forEach(oi=>{if(!oi.custom){
    const found=newItems.find(ni=>ni.producto_id===oi.producto_id&&!ni.custom);
    if(!found)cambios.push('Quitó: '+oi.nombre+' '+qty(oi.cantidad,oi.unidad));
    else if(Math.abs(found.cantidad-oi.cantidad)>0.001)
      cambios.push('Modificó: '+oi.nombre+' '+qty(oi.cantidad,oi.unidad)+' → '+qty(found.cantidad,found.unidad));
  }});
  // Productos nuevos
  newItems.forEach(ni=>{
    if(ni.custom){cambios.push('Nota agregada: '+ni.nombre+' '+money(ni.precio));return;}
    const found=oldItems.find(oi=>oi.producto_id===ni.producto_id&&!oi.custom);
    if(!found)cambios.push('Agregó: '+ni.nombre+' '+qty(ni.cantidad,ni.unidad));
  });
  // Notas viejas quitadas
  oldItems.filter(i=>i.custom).forEach(oi=>{
    if(!newItems.find(ni=>ni.custom&&ni.nombre===oi.nombre))
      cambios.push('Quitó nota: '+oi.nombre);
  });

  const totalAntes=v.total;

  // ── Ajustar stock ───────────────────────────────────────────────────────
  oldItems.forEach(it=>{if(!it.custom){const p=findP(it.producto_id);
    if(p){p.stock=Math.round((p.stock+it.cantidad)*1000)/1000;p.updated_at=now();}}});
  newItems.forEach(it=>{if(!it.custom){const p=findP(it.producto_id);
    if(p){p.stock=Math.round((p.stock-it.cantidad)*1000)/1000;p.updated_at=now();}}});

  // ── Recalcular totales ──────────────────────────────────────────────────
  const sub=newItems.reduce((a,it)=>a+it.subtotal,0);
  const tot=Math.max(0,sub-v.descuento);
  const costoTotal=newItems.reduce((a,it)=>a+(it.costo||0)*it.cantidad,0);

  // ── Guardar entrada de auditoría ────────────────────────────────────────
  if(!v.ediciones)v.ediciones=[];
  v.ediciones.push({
    fecha:now(),
    usuario:state.member.nombre||'Dueño',
    motivo,cambios,
    total_antes:totalAntes,
    total_despues:Math.round(tot*100)/100
  });

  v.items=newItems;v.subtotal=sub;v.total=tot;v.costo_total=costoTotal;v.updated_at=now();

  save();push('ventas',v);
  productos().forEach(p=>push('productos',p));
  _editItems=[];
  closeSheet();render();
  toast('Ticket #'+v.folio+' actualizado ✓','ok');
};

function cajaHoy(){const t0=startOfDay(new Date());
  const movs=cajaMovs().filter(c=>new Date(c.fecha)>=t0);
  const apertura=movs.filter(c=>c.tipo==='apertura').reduce((a,c)=>a+c.monto,0);
  const entradas=movs.filter(c=>c.tipo==='entrada').reduce((a,c)=>a+c.monto,0);
  const salidas=movs.filter(c=>c.tipo==='salida').reduce((a,c)=>a+c.monto,0);
  const ventasEf=ventas().filter(v=>new Date(v.fecha)>=t0&&v.metodo_pago==='efectivo').reduce((a,v)=>a+v.total,0);
  const cerrada=movs.some(c=>c.tipo==='cierre');
  return {apertura,entradas,salidas,ventasEf,esperado:apertura+ventasEf+entradas-salidas,abierta:apertura>0&&!cerrada,movs};
}

function formatTicketWA(venta){
  const d=new Date(venta.fecha);
  const fecha=d.toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'});
  const hora=d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',hour12:false});
  const negocio=(state.business.nombre||'FRUTERIA EL MERCADITO').toUpperCase();
  const W=28;
  const center=s=>{const sp=Math.max(0,Math.floor((W-s.length)/2));return ' '.repeat(sp)+s;};
  const col=(l,r)=>{const sp=Math.max(1,W-l.length-r.length);return l+' '.repeat(sp)+r;};
  const line='='.repeat(W);const dash='-'.repeat(W);
  const items=venta.items.map(i=>{
    const cant=qty(i.cantidad,i.unidad);const sub=money0(i.subtotal);
    const n=i.nombre.substring(0,W-1);
    if(n.length+cant.length+sub.length+2<=W)return col(n+' '+cant,sub);
    return n+'\n'+col('  '+cant,sub);
  }).join('\n');
  const metodo=venta.metodo_pago==='efectivo'?'Efectivo':venta.metodo_pago==='tarjeta'?'Tarjeta':'Transferencia';
  const ticket=[
    center(negocio),fecha+'  '+hora+'h',
    'Folio: '+String(venta.folio).padStart(6,'0'),
    line,items,dash,
    col('TOTAL:',money0(venta.total)),
    line,'Pago: '+metodo,'',
    center('GRACIAS POR SU PREFERENCIA'),
  ].join('\n');
  return encodeURIComponent('```\n'+ticket+'\n```');
}

async function _cargarJsPDF(){
  if(window.jspdf)return window.jspdf;
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=()=>res(window.jspdf);s.onerror=rej;document.head.appendChild(s);});
}

async function generarTicketPDF(venta){
  const {jsPDF}=await _cargarJsPDF();
  const W=80,M=5,cx=W/2;
  const negocio=(state.business.nombre||'FRUTERIA EL MERCADITO').toUpperCase();
  const d=new Date(venta.fecha);
  const fecha=d.toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'});
  const hora=d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',hour12:false});
  // Altura dinamica
  const itemLines=venta.items.reduce((a,i)=>a+(i.nombre.length>18?2:1),0);
  const H=Math.max(130,60+itemLines*7+60);
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:[W,H]});
  let y=8;
  // Header
  doc.setFont('Courier','bold');doc.setFontSize(11);
  doc.text(negocio,cx,y,{align:'center'});y+=5;
  doc.setFont('Courier','normal');doc.setFontSize(8);
  doc.text(fecha+'  '+hora+'h',cx,y,{align:'center'});y+=4;
  doc.text('Folio: '+String(venta.folio).padStart(6,'0'),cx,y,{align:'center'});y+=4;
  // Line
  doc.setLineWidth(0.3);doc.line(M,y,W-M,y);y+=5;
  // Items
  doc.setFontSize(9);
  (venta.items||[]).forEach(i=>{
    const n=i.nombre.substring(0,20);
    const cant=qty(i.cantidad,i.unidad);
    const sub=money0(i.subtotal);
    doc.setFont('Courier','bold');doc.text(n,M,y);
    doc.text(sub,W-M,y,{align:'right'});y+=4;
    doc.setFont('Courier','normal');doc.setFontSize(8);
    doc.text('  '+cant+' x '+money0(i.precio),M,y);y+=4;
    doc.setFontSize(9);
  });
  // Dashed line
  doc.setLineDashPattern([1.5,1],0);doc.line(M,y,W-M,y);y+=5;
  doc.setLineDashPattern([],0);
  // Total
  doc.setFont('Courier','bold');doc.setFontSize(13);
  doc.text('TOTAL:',M,y);doc.text(money0(venta.total),W-M,y,{align:'right'});y+=6;
  doc.setLineWidth(0.5);doc.line(M,y,W-M,y);y+=5;
  // Payment
  doc.setFont('Courier','normal');doc.setFontSize(8);
  const met=venta.metodo_pago==='efectivo'?'Efectivo':venta.metodo_pago==='tarjeta'?'Tarjeta':'Transferencia';
  doc.text('Pago: '+met,M,y);y+=8;
  // Footer
  doc.setFont('Courier','bold');doc.setFontSize(8);
  doc.text('GRACIAS POR SU PREFERENCIA',cx,y,{align:'center'});
  const blob=doc.output('blob');
  return new File([blob],'ticket-'+venta.folio+'.pdf',{type:'application/pdf'});
}

window._compartirTicketPDF=async function(ventaId){
  const venta=state.ventas.find(v=>v.id===ventaId);if(!venta)return;
  const btn=document.getElementById('pdfBtn');
  if(btn){btn.textContent='⏳ Generando PDF...';btn.disabled=true;}
  try{
    const file=await generarTicketPDF(venta);
    if(navigator.share&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'Ticket #'+venta.folio,
        text:'Ticket de '+( state.business.nombre||'Fruteria El Mercadito')});
    }else{
      // Fallback: descargar
      const url=URL.createObjectURL(file);
      const a=document.createElement('a');a.href=url;a.download=file.name;a.click();
      URL.revokeObjectURL(url);
      toast('PDF descargado ✓','ok');
    }
  }catch(e){
    if(e.name!=='AbortError')toast('Error: '+e.message.substring(0,50),'bad');
  }
  if(btn){btn.textContent='📄 Compartir ticket PDF por WhatsApp';btn.disabled=false;}
};


function findCliente(tel){
  const n=tel.replace(/\D/g,'');
  return (state.clientes||[]).find(c=>!c.deleted&&c.telefono.replace(/\D/g,'')===n);

}

window._waSeleccionar=function(clienteId,ventaId){
  const c=(state.clientes||[]).find(x=>x.id===clienteId);
  const v=state.ventas.find(x=>x.id===ventaId);
  if(!c||!v)return;
  v.cliente_id=c.id;v.cliente_nombre=c.nombre||c.telefono;v.updated_at=now();
  c.ultima_visita=now();c.total_compras=(c.total_compras||0)+v.total;
  c.num_visitas=(c.num_visitas||0)+1;c.updated_at=now();
  save();push('ventas',v);push('clientes',c);
  enviarWA(c.telefono,v); // abre hoja de confirmación directo (reemplaza la hoja actual)
};

window._waNuevo=function(ventaId){
  const tel=(document.getElementById('waTel')||{value:''}).value.trim();
  const nombre=(document.getElementById('waNombre')||{value:''}).value.trim();
  if(!tel){toast('Pon el número de WhatsApp','bad');return;}
  const v=state.ventas.find(x=>x.id===ventaId);if(!v)return;
  const num=state.config.nextNumCliente||1;
  state.config.nextNumCliente=num+1;
  const c={id:uid(),business_id:state.business.id,num_cliente:num,nombre,
    telefono:tel,num_visitas:1,total_compras:v.total,ultima_visita:now(),
    notas:'',deleted:false,updated_at:now()};
  state.clientes=state.clientes||[];state.clientes.push(c);
  v.cliente_id=c.id;v.cliente_nombre=nombre||tel;v.updated_at=now();
  save();push('clientes',c);push('ventas',v);
  enviarWA(tel,v); // abre hoja de confirmación directo
};

function rentRange(){
  const hoy=new Date();
  if(rentPreset==='hoy')return{d:startOfDay(hoy),h:hoy};
  if(rentPreset==='7d') return{d:daysAgo(7),h:hoy};
  if(rentPreset==='30d')return{d:daysAgo(30),h:hoy};
  if(rentPreset==='mes')return{d:new Date(hoy.getFullYear(),hoy.getMonth(),1),h:hoy};
  // custom: usa variables de estado, no DOM
  if(!rentDesde||!rentHasta)return{d:daysAgo(30),h:hoy};
  let d=new Date(rentDesde+'T00:00:00');let h=new Date(rentHasta+'T23:59:59');
  if(d>h){const tmp=d;d=h;h=tmp;}
  return{d,h};}

window._rentCalc=()=>{
  // Leer valores actuales del DOM también (por si acaso)
  const di=document.getElementById('rentD');const hi=document.getElementById('rentH');

  if(hi&&hi.value)rentHasta=hi.value;

function calcRent(d,h){
  const inR=t=>{const dt=new Date(t);return dt>=d&&dt<=h;};
  const vs=ventas().filter(v=>inR(v.fecha));
  const ms=mermas().filter(m=>inR(m.fecha));
  const gs=(state.caja||[]).filter(c=>!c.deleted&&c.tipo==='salida'&&inR(c.fecha));
  const tv=vs.reduce((a,v)=>a+v.total,0);
  const cm=vs.reduce((a,v)=>a+(v.costo_total||0),0);
  const ub=tv-cm;
  const tm=ms.reduce((a,m)=>a+m.valor_perdido,0);
  const te=gs.reduce((a,g)=>a+g.monto,0);
  const un=ub-tm-te;
  return{tv,cm,ub,mbr:tv>0?ub/tv*100:0,tm,te,un,mnr:tv>0?un/tv*100:0,nv:vs.length};}

window._rentCalc=()=>{
  const di=document.getElementById('rentD');const hi=document.getElementById('rentH');
  if(di&&hi&&di.value&&hi.value)render();};

  // Escala de barras: max de todos los valores para que sean proporcionales entre si

  const minibar=(v,color)=>{const p=barMax>0?Math.min(100,Math.max(0.5,Math.abs(v)/barMax*100)):0;

    <div class="tiny muted" style="text-align:right;padding:2px 0 8px;border-bottom:1px solid var(--line)">Margen bruto: ${r.mbr.toFixed(1)}%</div>
    ${fila('&minus; Merma',r.tm,'var(--rose)',true,false)}
    ${fila('&minus; Gastos / Egresos',r.te,'#f59e0b',true,false)}
    <div style="padding:14px 0 4px;border-top:2px solid var(--ink);margin-top:6px">

          <span style="font-size:20px;font-weight:900;color:${rentable?'var(--green-d)':'var(--rose)'}">${money0(r.un)}</span>

window._mpCobrar=async function(){
  const tot=Math.max(0,cartTotal()-cartDiscount);
  const token=state.config.mpToken;const devId=state.config.mpDeviceId;
  if(!token||!devId){openMpSettings();return;}
  const btn=document.getElementById('mpBtn');
  if(btn){btn.textContent='⏳ Enviando a terminal...';btn.disabled=true;}
  try{
    const r=await fetch(
      `https://api.mercadopago.com/point/integration-api/devices/${devId}/payment-intents`,
      {method:'POST',
       headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json',
         'X-Idempotency-Key':uid()},
       body:JSON.stringify({amount:tot,additional_info:{description:'Ticket #'+state.config.folio,
         external_reference:'frt-'+state.config.folio}})});
    const data=await r.json();
    if(data.id||data.payment_intent_id){
      payMethod='tarjeta';window._payUpd();
      toast('✓ Cobro enviado · Esperando pago en terminal','ok');
      if(btn){btn.textContent='⏳ Esperando pago...';btn.style.background='#d4edda';}
    }else{throw new Error(data.message||data.error||JSON.stringify(data).substring(0,80));}
  }catch(e){
    toast('Error terminal: '+e.message.substring(0,60),'bad');
    if(btn){btn.textContent='🟡 Terminal Mercado Pago';btn.disabled=false;}}
};

function openMpSettings(){
  const t=state.config.mpToken||'';const d=state.config.mpDeviceId||'';
  openSheet(`<h2>🟡 Terminal Mercado Pago</h2>
  <p class="sub">Configura tu terminal Point para cobrar directamente</p>
  <div class="field"><label>Access Token (de tu cuenta MP)</label>
    <input id="mpTok" placeholder="APP_USR-..." value="${t}"
      style="font-size:12px;font-family:monospace"></div>
  <div class="field"><label>Device ID de la terminal</label>
    <input id="mpDev" placeholder="PAX_A910..." value="${d}"></div>
  <button class="btn block" style="margin-bottom:8px" onclick="window._mpDetectar()">
    🔍 Detectar terminal automáticamente</button>
  <div id="mpDevList" style="margin-bottom:10px"></div>
  <button class="btn primary block" onclick="window._mpGuardar()">Guardar configuración</button>
  <p class="tiny muted" style="margin-top:10px;text-align:center">
    Obtén tu Access Token en<br><b>mercadopago.com.mx → Tu negocio → Credenciales</b></p>`);}

window._mpGuardar=function(){
  state.config.mpToken=(document.getElementById('mpTok')||{value:''}).value.trim();
  state.config.mpDeviceId=(document.getElementById('mpDev')||{value:''}).value.trim();
  save();closeSheet();toast('Terminal configurada ✓','ok');};

window._mpDetectar=async function(){
  const token=(document.getElementById('mpTok')||{value:''}).value.trim();
  if(!token){toast('Primero ingresa el Access Token','bad');return;}
  const list=document.getElementById('mpDevList');
  if(list)list.innerHTML='<div class="tiny muted">Buscando terminales...</div>';
  try{
    const r=await fetch('https://api.mercadopago.com/point/integration-api/devices',
      {headers:{'Authorization':'Bearer '+token}});
    const data=await r.json();
    const devs=(data.devices||[]);
    if(!devs.length){if(list)list.innerHTML='<div class="tiny muted">Sin terminales. ¿Está en modo integración?</div>';return;}
    if(list)list.innerHTML=devs.map(d=>`
      <button onclick="document.getElementById('mpDev').value='${d.id}';this.style.background='var(--green)';this.style.color='#fff'"
        style="display:block;width:100%;text-align:left;padding:8px 12px;border-radius:10px;
        background:var(--surface-2);border:none;margin-bottom:6px;font-size:13px;cursor:pointer">
        📱 ${d.id}<br><span class="tiny muted">${d.status||''} ${d.operating_mode||''}</span>
      </button>`).join('');
  }catch(e){if(list)list.innerHTML='<div class="tiny muted">Error: '+e.message+'</div>';}};

$('#lgBtn').onclick=async()=>{
  const email=$('#lgEmail').value.trim(),pass=$('#lgPass').value;

  if(!email||!pass){msg.textContent='Pon correo y contraseña';return;}
