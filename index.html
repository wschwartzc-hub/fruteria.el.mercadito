    else res=await sb.auth.signInWithPassword({email,password:pass});
    if(res.error)throw res.error;
    if(loginMode==='signup'&&!res.data.session){msg.style.color='var(--green-d)';msg.textContent='Cuenta creada. Si pide confirmar correo, revísalo y vuelve a entrar.';$('#lgBtn').textContent='Entrar';loginMode='login';return;}
    sbUser=res.data.user;await afterLogin();
  }catch(e){msg.textContent=traducirError(e.message);$('#lgBtn').textContent=loginMode==='login'?'Entrar':'Crear cuenta';}
};
function traducirError(m){m=(m||'').toLowerCase();
  if(m.includes('invalid login'))return 'Correo o contraseña incorrectos';
  if(m.includes('already registered'))return 'Ese correo ya tiene cuenta. Entra normal.';
  if(m.includes('password'))return 'La contraseña debe tener al menos 6 caracteres';
  return m||'Error al conectar';}

// Mapper: nombre local → nombre real en Supabase (prefijo frt_)
const frt=t=>t==='businesses'||t==='members'?'frt_'+t:'frt_'+t;

async function afterLogin(){
  let {data:mems, error:eMems}=await sb.from('frt_members').select('business_id,nombre,rol').eq('user_id',sbUser.id);
  if(eMems){
    console.error('frt_members error:',eMems);
    toast('Tablas no encontradas. Corre el SQL schema en Supabase.','bad');
    return;
  }
  let bid;
  if(mems&&mems.length){bid=mems[0].business_id;state.member.nombre=mems[0].nombre||state.member.nombre;state.member.rol=mems[0].rol;}
  else{
    const {data:biz,error:e1}=await sb.from('frt_businesses').insert({nombre:state.business.nombre||'Frutería El Mercadito'}).select().single();
    if(e1){
      console.error('frt_businesses insert error:',e1);
      toast('Error al crear negocio: '+e1.message,'bad');
      return;
    }
    bid=biz.id;
    await sb.from('frt_members').insert({user_id:sbUser.id,business_id:bid,nombre:state.member.nombre||'Dueño',rol:'dueno'});
    await cloudPushAll(bid);
  }
  state.cloud.businessId=bid;state.cloud.connected=true;state.business.id=bid;save();
  hideLogin();setSync(true,'Nube');
  await cloudPull(true);subscribeRealtime();boot();
  toast('Conectado a la nube ✓','ok');
}
async function cloudPushAll(bid){
  for(const t of TABLES){const rows=(state[t]||[]).map(r=>({...r,business_id:bid}));
    if(rows.length)await sb.from(frt(t)).upsert(rows);}
}
async function cloudPull(silent){
  if(!sb||!state.cloud.businessId)return;
  if(!silent)toast('Sincronizando...');
  for(const t of TABLES){
    const {data,error}=await sb.from(frt(t)).select('*').eq('business_id',state.cloud.businessId);
    if(error){console.warn(t,error);continue;}
    mergeRows(t,data||[]);
  }
  save();render();if(!silent)toast('Sincronizado ✓','ok');
}
function mergeRows(table,remote){const local=state[table]||[];const map={};
  local.forEach(r=>map[r.id]=r);
  remote.forEach(r=>{const ex=map[r.id];
    if(!ex||new Date(r.updated_at||0)>=new Date(ex.updated_at||0))map[r.id]=r;});
  state[table]=Object.values(map);
}
async function push(table,row){
  if(!sb||!state.cloud.connected)return;
  try{const r={...row,business_id:state.cloud.businessId};await sb.from(frt(table)).upsert(r);}catch(e){console.warn(e);}
}
function subscribeRealtime(){realtimeChans.forEach(c=>sb.removeChannel(c));realtimeChans=[];
  TABLES.forEach(t=>{const ch=sb.channel('rt_'+t)
    .on('postgres_changes',{event:'*',schema:'public',table:frt(t),filter:'business_id=eq.'+state.cloud.businessId},
      payload=>{if(payload.new){mergeRows(t,[payload.new]);save();render();}})
    .subscribe();realtimeChans.push(ch);});
}
async function cloudLogout(){
  try{await sb.auth.signOut();}catch(e){}
  // Limpiar sesión y datos en memoria — sin datos que ver
  sbUser=null;sb=null;
  state.cloud={connected:false,businessId:null,url:'',anon:''};
  state.ventas=[];state.compras=[];state.mermas=[];state.caja=[];
  state.clientes=[];state.productos=[];
  save();closeSheet();setSync(false,'Local');
  showLogin();
  toast('Sesión cerrada');
}

function openChartFS(title,svgEl){
  const svg=svgEl?svgEl.innerHTML:'';
  const ov=document.createElement('div');
  ov.id='chartFS';
  ov.style.cssText='position:fixed;inset:0;z-index:300;background:white;overflow:hidden;display:flex;flex-direction:column';
  ov.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line);flex-shrink:0">
      <div style="font-weight:800;font-size:16px">${title}</div>
      <button onclick="document.getElementById('chartFS').remove()"
        style="width:34px;height:34px;border-radius:17px;background:var(--surface-2);border:none;font-size:18px;cursor:pointer;display:grid;place-items:center">✕</button>
    </div>
    <div style="flex:1;overflow:auto;padding:20px 12px;display:flex;align-items:center">
      <div style="width:100%">${svg}</div>
    </div>
    <div class="tiny faint" style="text-align:center;padding:8px">Rota el teléfono para ver la gráfica más amplia</div>`;

}
window.openChartFS=openChartFS;
const WMO={0:'Despejado ☀️',1:'Mayormente despejado 🌤️',2:'Parcialmente nublado ⛅',3:'Nublado ☁️',
  45:'Neblina 🌫️',48:'Neblina ❄️',51:'Llovizna 🌦️',53:'Llovizna 🌦️',55:'Llovizna fuerte 🌧️',
  61:'Lluvia ligera 🌧️',63:'Lluvia 🌧️',65:'Lluvia fuerte 🌧️',
  71:'Nieve ligera 🌨️',73:'Nieve 🌨️',75:'Nieve fuerte 🌨️',
  80:'Chubascos 🌦️',81:'Chubascos 🌧️',82:'Chubascos fuertes ⛈️',
  95:'Tormenta ⛈️',96:'Tormenta con granizo ⛈️',99:'Tormenta fuerte ⛈️'};

function updateInfoBar(){
  const h=new Date().getHours();
  const greet=h<12?'Buenos días':h<19?'Buenas tardes':'Buenas noches';
  const nombre=state.member.nombre||'';
  const el=document.getElementById('infoGreet');
  if(el)el.textContent=(nombre?`${greet}, ${nombre} 👋`:`${greet} 👋`);
}

async function cargarClima(){
  updateInfoBar();
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(async pos=>{
    try{
      const {latitude:lat,longitude:lon}=pos.coords;
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`+
        `&current=temperature_2m,weathercode,apparent_temperature`+
        `&daily=temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=1`;
      const r=await fetch(url);const d=await r.json();
      const temp=Math.round(d.current.temperature_2m);
      const max=Math.round(d.daily.temperature_2m_max[0]);
      const min=Math.round(d.daily.temperature_2m_min[0]);
      const emoji=(WMO[d.current.weathercode]||'—').split(' ').pop();
      const el=document.getElementById('infoClima');
      if(el)el.textContent=`${emoji} ${temp}° · ↑${max}° ↓${min}°`;
    }catch(e){}
  },()=>{},{timeout:6000});
}

/* ============================ ARRANQUE ============================ */
function adjustPadding(){
  const h=document.getElementById('fixedHeader');
  const m=document.getElementById('main');
  if(h&&m)m.style.paddingTop=(h.offsetHeight+16)+'px';
}
function boot(){adjustPadding();go(cart.length?'vender':'inteligencia');cargarClima();}
window.addEventListener('resize',adjustPadding);
async function start(){
  if(cloudConfigured()&&initSupabase()){
    // ¿hay sesión activa?
    try{const {data}=await sb.auth.getSession();
      if(data.session){sbUser=data.session.user;state.cloud.connected=true;
        hideLogin();setSync(true,'Nube');
        if(!state.cloud.businessId){await afterLogin();}else{await cloudPull(true);subscribeRealtime();boot();}
        return;}
    }catch(e){console.warn(e);}
    showLogin();return;
  }
  // modo local
  hideLogin();setSync(false,'Local');boot();
}
start();
</script>
